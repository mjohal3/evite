<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #f5ede4;
    font-family: 'Cormorant Garamond', Georgia, serif;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Envelope Screen ── */
  #envelope-screen {
    position: fixed; inset: 0;
    z-index: 100;
    background: #ffffff;
    transition: opacity 0.6s ease;
    overflow: hidden;
  }
  #envelope-screen.hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* Corner mandala decorations on the white background */
  .corner-decor {
    position: absolute;
    width: 35vmin; height: 35vmin;
    min-width: 140px; min-height: 140px;
    max-width: 300px; max-height: 300px;
    opacity: 0.06;
    pointer-events: none;
    z-index: 1;
  }
  .corner-decor.tl { top: 0; left: 0; }
  .corner-decor.tr { top: 0; right: 0; transform: scaleX(-1); }
  .corner-decor.bl { bottom: 0; left: 0; transform: scaleY(-1); }
  .corner-decor.br { bottom: 0; right: 0; transform: scale(-1, -1); }

  /* ── Envelope container — fills 100% viewport ── */
  .envelope-container {
    position: absolute;
    inset: 12px;
    perspective: 1400px;
    cursor: pointer;
    border: 1px solid rgba(184,149,106,0.3);
    border-radius: 4px;
    overflow: hidden;
  }

  /* ── Top flap with text ── */
  .flap-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    z-index: 5;
    background: linear-gradient(180deg, #ede4d8 0%, #e6dace 50%, #e0d5c8 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3vh 20px 6vh;
    transform-origin: top center;
    transition: transform 0.9s cubic-bezier(0.4, 0, 0.15, 1);
  }
  .envelope-container.opened .flap-top {
    transform: rotateX(-180deg);
    z-index: 0;
  }

  /* ── Bottom flap with logo ── */
  .flap-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 50%;
    z-index: 3;
    background: linear-gradient(180deg, #e8ddd0 0%, #ede4d8 40%, #f0e8dc 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6vh 20px 3vh;
    transform-origin: bottom center;
    transition: transform 0.9s cubic-bezier(0.4, 0, 0.15, 1);
  }
  .envelope-container.opened .flap-bottom {
    transform: rotateX(180deg);
    z-index: 0;
  }

  /* Lacy ribbon border */
  .lace-border {
    position: absolute;
    inset: 6px;
    z-index: 50;
    pointer-events: none;
    border-radius: 4px;
    border: 1.5px solid rgba(184,149,106,0.4);
  }
  .lace-border::before {
    content: '';
    position: absolute;
    inset: 4px;
    border-radius: 3px;
    border: 1px solid rgba(184,149,106,0.25);
  }
  .lace-border::after {
    content: '';
    position: absolute;
    inset: 1.5px;
    border-radius: 3px;
    background: repeating-conic-gradient(
      from 0deg,
      rgba(184,149,106,0.15) 0deg 3deg,
      transparent 3deg 12deg
    );
    mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    mask-composite: exclude;
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    padding: 1px;
  }

  /* Corner ornaments for the lace border */
  .lace-corner {
    position: absolute;
    width: 24px; height: 24px;
    z-index: 51;
    pointer-events: none;
  }
  .lace-corner svg { width: 100%; height: 100%; }
  .lace-corner.lt { top: 2px; left: 2px; }
  .lace-corner.rt { top: 2px; right: 2px; transform: scaleX(-1); }
  .lace-corner.lb { bottom: 2px; left: 2px; transform: scaleY(-1); }
  .lace-corner.rb { bottom: 2px; right: 2px; transform: scale(-1,-1); }

  /* ── Heading text ── */
  .invite-heading {
    font-weight: 700;
    font-size: clamp(12px, 2.5vmin, 20px);
    color: #2e2520;
    text-align: center;
    letter-spacing: 2.5px;
    line-height: 2;
    text-transform: uppercase;
    flex-shrink: 1;
  }
  .invite-heading .script-line {
    display: block;
    font-family: 'Great Vibes', cursive;
    font-size: clamp(32px, 7vmin, 58px);
    color: #7a5e3e;
    margin: 4px 0;
    letter-spacing: 1px;
    text-transform: none;
    font-weight: 400;
    white-space: nowrap;
  }
  .invite-heading .ceremony-line {
    display: block;
    letter-spacing: 5px;
  }

  /* ── Logo on bottom section ── */
  .logo-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .logo-wrap img {
    width: clamp(130px, 22vh, 280px);
    height: auto;
    opacity: 0.95;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.1));
  }

  /* ── Wax Seal ── */
  .seal {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    width: clamp(100px, 18vh, 170px);
    height: clamp(100px, 18vh, 170px);
    transition: transform 0.3s ease, opacity 0.5s ease;
  }
  .seal:hover { transform: translate(-50%, -50%) scale(1.06); }
  .seal:active { transform: translate(-50%, -50%) scale(0.96); }
  .envelope-container.opened .seal {
    opacity: 0;
    pointer-events: none;
    transform: translate(-50%, -50%) scale(0.4);
  }

  .seal-svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  @keyframes sealPulse {
    0%, 100% { filter: drop-shadow(0 4px 10px rgba(110,26,40,0.45)) drop-shadow(0 0 0 rgba(176,53,69,0.25)); }
    50% { filter: drop-shadow(0 4px 10px rgba(110,26,40,0.45)) drop-shadow(0 0 14px rgba(176,53,69,0.22)); }
  }
  .seal-svg { animation: sealPulse 2.8s ease-in-out infinite; }
  .envelope-container.opened .seal-svg { animation: none; }

  /* ── Video Screen ── */
  #video-screen {
    position: fixed; inset: 0;
    z-index: 50;
    background: linear-gradient(135deg, #f5e6e0 0%, #f0ddd2 25%, #ecdac8 50%, #e8d0be 75%, #f2e0d6 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
    overflow: hidden;
  }
  #video-screen.active {
    opacity: 1;
    pointer-events: auto;
  }

  #video-backdrop {
    position: absolute; inset: -20px;
    z-index: 0;
    filter: blur(40px) brightness(0.85) saturate(1.3);
    transform: scale(1.15);
    object-fit: cover;
    width: calc(100% + 40px);
    height: calc(100% + 40px);
    pointer-events: none;
    opacity: 0.7;
  }

  #video-screen > video:not(#video-backdrop) {
    position: relative;
    z-index: 1;
    width: 100%; height: 100%;
    object-fit: contain;
  }

  #mute-btn {
    position: fixed;
    bottom: 24px; right: 24px;
    width: 48px; height: 48px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    z-index: 60;
    display: none;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  #mute-btn:hover { background: rgba(255,255,255,0.22); }
  #mute-btn:active { background: rgba(255,255,255,0.32); }

  .spinner {
    position: absolute;
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.12);
    border-top-color: rgba(255,255,255,0.75);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── RSVP Screen ── */
  #rsvp-screen {
    position: fixed; inset: 0;
    z-index: 200;
    background: linear-gradient(160deg, #f5ede4 0%, #ede1d3 50%, #e8d9c8 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
    overflow-y: auto;
  }
  #rsvp-screen.active {
    opacity: 1;
    pointer-events: auto;
  }

  .rsvp-card {
    width: 90%;
    max-width: 440px;
    padding: 36px 28px;
    text-align: center;
  }

  .rsvp-card h2 {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(32px, 7vw, 52px);
    font-weight: 400;
    color: #7a5e3e;
    margin-bottom: 6px;
  }

  .rsvp-card .rsvp-subtitle {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: clamp(13px, 2.5vw, 17px);
    color: #6b5a48;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .rsvp-card .rsvp-divider {
    width: 60px;
    height: 1px;
    background: #b8956a;
    margin: 0 auto 28px;
    opacity: 0.5;
  }

  .rsvp-event-info {
    margin-bottom: 0;
  }
  .rsvp-event-info .rsvp-event-line {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: clamp(15px, 2.8vw, 19px);
    font-weight: 600;
    color: #2e2520;
    letter-spacing: 1px;
    line-height: 1.8;
  }
  .rsvp-event-info .rsvp-event-line.light {
    font-weight: 400;
    color: #6b5a48;
    font-size: clamp(13px, 2.4vw, 16px);
  }

  .rsvp-field {
    margin-bottom: 18px;
    text-align: left;
  }

  .rsvp-field label {
    display: block;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 14px;
    font-weight: 600;
    color: #5a4a3a;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .rsvp-field input,
  .rsvp-field select {
    width: 100%;
    padding: 12px 14px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 17px;
    color: #2e2520;
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(184,149,106,0.35);
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
  }

  .rsvp-field input:focus,
  .rsvp-field select:focus {
    border-color: #b8956a;
  }

  .rsvp-attending-options {
    display: flex;
    gap: 10px;
  }

  .rsvp-attending-options label {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 11px 0;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 16px;
    font-weight: 600;
    color: #5a4a3a;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(184,149,106,0.35);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .rsvp-attending-options input[type="radio"] {
    display: none;
  }

  .rsvp-attending-options input[type="radio"]:checked + label {
    background: #b8956a;
    color: #fff;
    border-color: #b8956a;
  }

  .rsvp-submit {
    display: inline-block;
    margin-top: 24px;
    padding: 14px 48px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #fff;
    background: #7a5e3e;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .rsvp-submit:hover { background: #8b6d4a; }
  .rsvp-submit:active { transform: scale(0.97); }
  .rsvp-submit:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .rsvp-success {
    display: none;
    text-align: center;
  }
  .rsvp-success h3 {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(28px, 6vw, 44px);
    color: #7a5e3e;
    font-weight: 400;
    margin-bottom: 12px;
  }
  .rsvp-success p {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 18px;
    color: #5a4a3a;
    line-height: 1.6;
  }

  .rsvp-error {
    display: none;
    color: #a04040;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 15px;
    margin-top: 12px;
  }

  /* ── Responsive fine-tuning ── */

  @media (min-width: 769px) {
    .invite-heading { letter-spacing: 2px; }
  }
</style>
</head>

        <circle cx="60" cy="60" r="39" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.2"/>
        <circle cx="60" cy="60" r="34" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.6"/>
        <text x="60" y="52" text-anchor="middle" font-family="'Dancing Script', cursive" font-size="22" font-weight="600" fill="#ffffff">Tap to</text>
        <text x="60" y="76" text-anchor="middle" font-family="'Dancing Script', cursive" font-size="22" font-weight="600" fill="#ffffff">Open</text>
      </svg>
    </div>
  </div>
</div>

<!-- ── Video Screen ── -->
<div id="video-screen">
  <video id="video-backdrop" muted playsinline autoplay loop></video>
  <div class="spinner" id="spinner"></div>
</div>

<!-- ── RSVP Screen ── -->
<div id="rsvp-screen">
  <div class="rsvp-card">
    <h2>RSVP</h2>
    <div class="rsvp-subtitle">Roka &amp; Chunni Ceremony</div>
    <div class="rsvp-divider"></div>

    <div class="rsvp-event-info">
      <div class="rsvp-event-line">Jasmeen Johal &amp; Arshdeep Lidhar</div>
      <div class="rsvp-event-line">Saturday, May 16, 2026 &middot; 6:00 PM EDT</div>
      <div class="rsvp-event-line">The Marigold</div>
      <div class="rsvp-event-line light">315 Churchill Ave, Somerset, NJ 08873</div>
    </div>

    <div class="rsvp-divider" style="margin-top:28px"></div>

    <form id="rsvp-form">
      <div class="rsvp-field">
        <label for="rsvp-name">Your Name</label>
        <input type="text" id="rsvp-name" required autocomplete="name" placeholder="First & Last Name">
      </div>

      <div class="rsvp-field">
        <div class="rsvp-attending-options">
          <input type="radio" name="attending" id="att-yes" value="Yes" required>
          <label for="att-yes">Joyfully Accept</label>
          <input type="radio" name="attending" id="att-no" value="No">
          <label for="att-no">Regretfully Decline</label>
        </div>
      </div>

      <div class="rsvp-field" id="guests-field" style="display:none">
        <label for="rsvp-guests">Number of Guests (including yourself)</label>
        <select id="rsvp-guests">
          <option value="1">1</option>
          <option value="2" selected>2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
        </select>
      </div>

      <button type="submit" class="rsvp-submit" id="rsvp-submit-btn">Send RSVP</button>
      <div class="rsvp-error" id="rsvp-error">Something went wrong. Please try again.</div>
    </form>

    <div class="rsvp-success" id="rsvp-success">
      <h3>Thank You!</h3>
      <p>We can't wait to celebrate with you.</p>
    </div>
  </div>
</div>

<button id="mute-btn" aria-label="Toggle sound">&#x1F507;</button>

<script>
  var envelope = document.getElementById('envelope');
  var envelopeScreen = document.getElementById('envelope-screen');
  var videoScreen = document.getElementById('video-screen');
  var muteBtn = document.getElementById('mute-btn');
  var spinner = document.getElementById('spinner');
  var seal = document.getElementById('seal');
  var backdrop = document.getElementById('video-backdrop');
  var video = null;
  var opened = false;

  function openEnvelope(e) {
    if (e) e.preventDefault();
    if (opened) return;
    opened = true;

    envelope.classList.add('opened');

    setTimeout(function () {
      videoScreen.classList.add('active');
      spinner.style.display = 'block';

      video = document.createElement('video');
      video.playsInline = true;
      video.setAttribute('playsinline', '');
      video.setAttribute('webkit-playsinline', '');
      video.preload = 'auto';
      video.muted = false;
      video.autoplay = false;
      video.controls = false;
      video.loop = false;
      video.style.cssText = 'width:100%;height:100%;object-fit:contain;';

      var source = document.createElement('source');
      source.src = 'Jasmeen & Arshdeep.mp4';
      source.type = 'video/mp4';
      video.appendChild(source);

      video.addEventListener('canplay', function () {
        spinner.style.display = 'none';
      }, { once: true });

      video.addEventListener('ended', function () {
        video.currentTime = Math.max(0, video.duration - 0.1);
        video.pause();
        showRSVP();
      });

      backdrop.src = 'Jasmeen & Arshdeep.mp4';
      backdrop.load();

      video.addEventListener('play', function () {
        backdrop.currentTime = video.currentTime;
        backdrop.play().catch(function(){});
      });
      video.addEventListener('pause', function () {
        backdrop.pause();
      });
      video.addEventListener('seeked', function () {
        backdrop.currentTime = video.currentTime;
      });

      videoScreen.appendChild(video);
      video.load();

      video.play().then(function () {
        muteBtn.style.display = 'flex';
        muteBtn.innerHTML = video.muted ? '&#x1F507;' : '&#x1F50A;';
        envelopeScreen.classList.add('hidden');
      }).catch(function () {
        video.muted = true;
        video.play().then(function () {
          muteBtn.style.display = 'flex';
          muteBtn.innerHTML = '&#x1F507;';
          envelopeScreen.classList.add('hidden');
        }).catch(function (err) {
          console.log('play failed', err);
        });
      });
    }, 950);
  }

  seal.addEventListener('click', openEnvelope);
  seal.addEventListener('touchend', function (e) {
    e.preventDefault();
    openEnvelope(e);
  });

  muteBtn.addEventListener('click', function (e) {
    e.stopPropagation();
    if (!video) return;
    video.muted = !video.muted;
    muteBtn.innerHTML = video.muted ? '&#x1F507;' : '&#x1F50A;';
    if (video.paused) {
      video.play().catch(function () {});
    }
  });

  /* ── RSVP Logic ── */

  // *** PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL ON THE LINE BELOW ***
  var GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby9IPfZR6bZ52MaZ4V2bEOVSLHpBT1l4-OZzOMhcIgW-PDdck3RR2fgLuFIjihRu4Uv7g/exec';

  var rsvpScreen = document.getElementById('rsvp-screen');
  var rsvpForm = document.getElementById('rsvp-form');
  var rsvpSuccess = document.getElementById('rsvp-success');
  var rsvpError = document.getElementById('rsvp-error');
  var guestsField = document.getElementById('guests-field');

  function showRSVP() {
    setTimeout(function () {
      rsvpScreen.classList.add('active');
      muteBtn.style.display = 'none';
    }, 800);
  }

  // Show/hide guest count based on attending selection
  document.querySelectorAll('input[name="attending"]').forEach(function (radio) {
    radio.addEventListener('change', function () {
      guestsField.style.display = this.value === 'Yes' ? 'block' : 'none';
    });
  });

  rsvpForm.addEventListener('submit', function (e) {
    e.preventDefault();
    rsvpError.style.display = 'none';

    var name = document.getElementById('rsvp-name').value.trim();
    var attendingEl = document.querySelector('input[name="attending"]:checked');
    if (!name || !attendingEl) return;

    var attending = attendingEl.value;
    var guests = attending === 'Yes' ? document.getElementById('rsvp-guests').value : '0';

    var submitBtn = document.getElementById('rsvp-submit-btn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending...';

    fetch(GOOGLE_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: name,
        attending: attending,
        guests: guests
      })
    }).then(function () {
      rsvpForm.style.display = 'none';
      rsvpSuccess.style.display = 'block';
    }).catch(function () {
      rsvpError.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send RSVP';
    });
  });
</script>

</body>
</html>
